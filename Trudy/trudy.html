<!DOCTYPE HTML>
<html>
<head>
  <title>TRUDY // Replay Attack Node</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
    body { font-family: 'Share Tech Mono', monospace; background-color: #050505; color: #00ff41; padding: 20px; text-align: center; margin: 0; }
    h1 { color: #00ff41; letter-spacing: 3px; text-shadow: 0 0 15px rgba(0, 255, 65, 0.6); border-bottom: 1px solid #00ff41; padding-bottom: 15px; }
    
    .display-box { background-color: #0a0a0a; height: 400px; width: 95%; max-width: 900px; margin: 20px auto; overflow-y: auto; text-align: left; padding: 20px; border-radius: 2px; border: 1px solid #00ff41; box-shadow: inset 0 0 20px rgba(0, 20, 0, 0.9); font-size: 15px; line-height: 1.6; }
    
    .btn { padding: 15px 30px; background-color: transparent; border: 2px solid #00ff41; color: #00ff41; cursor: pointer; border-radius: 2px; font-weight: bold; font-family: inherit; font-size: 16px; transition: 0.3s; margin: 10px; width: 350px; }
    .btn:hover { background-color: #00ff41; color: #000; box-shadow: 0 0 20px #00ff41; }
    
    .btn-attack { border-color: #ff003c; color: #ff003c; text-shadow: 0 0 5px rgba(255, 0, 60, 0.5); box-shadow: 0 0 10px rgba(255, 0, 60, 0.2); }
    .btn-attack:hover { background-color: #ff003c; color: #fff; box-shadow: 0 0 30px #ff003c; text-shadow: none; }

    /* Text Colors */
    .txt-sys { color: #555; }
    .txt-intercept { color: #00ff41; }
    .txt-err { color: #ff9f1c; }
    .txt-attack { color: #ff003c; font-weight: bold; }
    
    /* Alice (Pink) and Bob (Cyan) - separate colors */
    .txt-alice-vuln { color: #ff00aa; font-weight: bold; text-shadow: 0 0 10px rgba(255, 0, 170, 0.4); }
    .txt-alice-sec { color: #aa0077; font-weight: bold; }
    .txt-bob-vuln { color: #00ffff; font-weight: bold; text-shadow: 0 0 10px rgba(0, 255, 255, 0.4); }
    .txt-bob-sec { color: #00aaaa; font-weight: bold; }
  </style>
</head>
<body>
  <h1>TRUDY // PASSIVE SNIFFER NODE</h1>
  
  <div>
    <button class="btn" id="connectBtn" onclick="connectSerial()">[ BIND TO USB RADIO ]</button>
  </div>

  <div style="display: flex; justify-content: space-around; width: 95%; max-width: 900px; margin: 20px auto 0 auto;">
    <div class="display-box" style="width: 45%; height: 120px; margin: 0; overflow-y: hidden;">
      <h3 style="margin-top: 0; color: #ff00aa; border-bottom: 1px solid #ff00aa; font-size: 16px;">ALICE'S LAST MSG</h3>
      <div id="alice-content"></div>
    </div>
    <div class="display-box" style="width: 45%; height: 120px; margin: 0; overflow-y: hidden;">
      <h3 style="margin-top: 0; color: #00ffff; border-bottom: 1px solid #00ffff; font-size: 16px;">BOB'S LAST MSG</h3>
      <div id="bob-content"></div>
    </div>
  </div>

  <div class="display-box" id="display" style="height: 300px; margin-top: 20px;">
    <span class="txt-sys">> Awaiting hardware link...</span><br>
  </div>

  <script>
    let port;
    let writer;
    let displayBox = document.getElementById('display');
    let pendingLines = [];

    // Batch DOM updates every 100ms to prevent freezing during data floods
    setInterval(() => {
      if (pendingLines.length === 0) return;
      
      let fragment = document.createDocumentFragment();
      for (let item of pendingLines) {
        const span = document.createElement('span');
        span.className = item.cssClass;
        span.textContent = '> ' + item.text;
        fragment.appendChild(span);
        fragment.appendChild(document.createElement('br'));
      }
      
      // Limit to 500 lines so it processes even faster
      if (pendingLines.length > 500) {
        pendingLines = pendingLines.slice(pendingLines.length - 500); 
      }
      
      pendingLines = [];
      displayBox.appendChild(fragment);
      
      while (displayBox.childElementCount > 500) {
        displayBox.removeChild(displayBox.firstChild);
      }
      
      displayBox.scrollTop = displayBox.scrollHeight;
    }, 100);

    async function connectSerial() {
      try {
        port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200, dataBits: 8, stopBits: 1, parity: "none" });
        writer = port.writable.getWriter();
        document.getElementById('connectBtn').style.display = 'none';
        
        pendingLines.push({text: "USB BRIDGE ENGAGED. LISTENING FOR TARGET TRANSMISSIONS...", cssClass: "txt-sys"});

        const textDecoder = new TextDecoderStream();
        const readableStreamClosed = port.readable.pipeTo(textDecoder.writable);
        const reader = textDecoder.readable.getReader();
        let buffer = "";
        
        while (true) {
          const { value, done } = await reader.read();
          if (done) { reader.releaseLock(); break; }
          
          buffer += value;
          let lines = buffer.split('\n');
          buffer = lines.pop(); 
          
          for (let line of lines) {
            if (line.trim() !== "") {
              let cssClass = "txt-sys";
              if (line.includes("[ATTACK]")) cssClass = "txt-attack";
              else if (line.includes("[ALICE_VULN]")) cssClass = "txt-alice-vuln";
              else if (line.includes("[ALICE_SECURE]")) cssClass = "txt-alice-sec";
              else if (line.includes("[BOB_VULN]")) cssClass = "txt-bob-vuln";
              else if (line.includes("[BOB_SECURE]")) cssClass = "txt-bob-sec";
              else if (line.includes("[ERROR]")) cssClass = "txt-err";
              else if (line.includes("SYSTEM_READY") || line.includes("ENGAGED") || line.includes("WAITING FOR DATA")) cssClass = "txt-sys";
              else if (line.includes("[INTERCEPT]")) cssClass = "txt-intercept";
              
              pendingLines.push({text: line, cssClass: cssClass});
              
              if (line.includes("[ALICE_VULN]") || line.includes("[ALICE_SECURE]")) {
                document.getElementById('alice-content').innerHTML = `<span class="${cssClass}">> ${line}</span>`;
              } else if (line.includes("[BOB_VULN]") || line.includes("[BOB_SECURE]")) {
                document.getElementById('bob-content').innerHTML = `<span class="${cssClass}">> ${line}</span>`;
              }
            }
          }
        }
      } catch (error) {
        pendingLines.push({text: "FATAL ERROR: " + error, cssClass: "txt-err"});
      }
    }
  </script>
</body>
</html>
